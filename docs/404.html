<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-64.png" />
    <title>Zongyao Mao</title>
    <script>
      // SPA redirect trick for GitHub Pages.
      // Encode the full path as a query param and redirect to root,
      // where index.html will restore the path before React boots.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
      );
    </script>
  </head>
  <body>
    <p>Redirecting…</p>
  </body>
</html>
